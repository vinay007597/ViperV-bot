name: Build Linux Binary

on:
  push:
    paths:
      - 'v.cpp'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile v.cpp
        run: |
          g++ -o v v.cpp -static
          
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: v-binary
          path: v
          retention-days: 5
